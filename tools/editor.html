<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA DUELS — 에디터</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f0f12;
  --bg2:       #151518;
  --bg3:       #1c1c20;
  --bg4:       #232328;
  --border:    #28282e;
  --border2:   #333338;
  --text:      #c4c4d0;
  --text-sub:  #646470;
  --text-dim:  #38383e;
  --accent:    #507a60;
  --accent2:   #1a2820;
  --accent-lit:#72aa88;
  --radius:    5px;
  --font:      'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
  --mono:      'Consolas', 'D2Coding', 'Courier New', monospace;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.app-header {
  background: #09090c;
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.app-logo { font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--accent-lit); }
.app-desc { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

/* ── TABS ── */
.app-tabs {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 9px 22px;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--text-sub);
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent-lit); border-bottom-color: var(--accent); }

/* ── MAIN ── */
.app-main { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.tab-panel { display: none; flex: 1; min-height: 0; overflow: hidden; }
.tab-panel.active { display: flex; }

/* ── FORM PANEL ── */
.form-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  border-right: 1px solid var(--border);
  min-width: 0;
}

/* ── SECTION ── */
.section { margin-bottom: 24px; }
.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent-lit);
  opacity: .7;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── FIELDS ── */
.field { margin-bottom: 10px; }
.field-label { font-size: 10px; letter-spacing: 1px; color: var(--text-sub); display: block; margin-bottom: 3px; }
.field-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

input[type="text"], select, textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border-color .15s;
  resize: vertical;
}
input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { min-height: 72px; line-height: 1.65; }
textarea.tall      { min-height: 110px; }
textarea.very-tall { min-height: 150px; }
select option { background: var(--bg3); }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 6px; margin-bottom: 16px; }
.btn-sm {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 12px;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
  white-space: nowrap;
}
.btn-sm:hover { color: var(--text); }
.btn-sm.accent:hover { color: var(--accent-lit); border-color: var(--accent); background: var(--accent2); }

/* ── ITEM ACCORDION ── */
.item-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
.item-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.item-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.item-header:hover { background: var(--bg4); }
.item-num { font-size: 10px; color: var(--text-dim); min-width: 20px; font-variant-numeric: tabular-nums; }
.item-label { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  padding: 1px 6px; border-radius: 2px; flex-shrink: 0;
}
.item-badge.win  { background: rgba(176,80,80,.2);  color: #d08080; border: 1px solid rgba(176,80,80,.3); }
.item-badge.lose { background: rgba(56,120,176,.2); color: #80a8d0; border: 1px solid rgba(56,120,176,.3); }
.item-controls { display: flex; gap: 3px; flex-shrink: 0; }
.item-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-sub);
  font-size: 11px;
  padding: 1px 6px;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
}
.item-btn:hover { background: var(--bg4); color: var(--text); }
.item-btn.del:hover { color: #c06060; border-color: rgba(192,96,96,.4); }
.item-chevron { color: var(--text-dim); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
.item-card.open .item-chevron { transform: rotate(90deg); }
.item-body { display: none; padding: 12px 10px; border-top: 1px solid var(--border); }
.item-card.open .item-body { display: block; }

/* ── ADD BUTTON ── */
.btn-add {
  background: var(--bg3);
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 8px;
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: color .15s, border-color .15s, background .15s;
}
.btn-add:hover { color: var(--accent-lit); border-color: var(--accent); background: var(--accent2); }

/* ── OUTPUT PANEL ── */
.output-panel {
  width: 390px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg2);
}
.output-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.output-filename { font-size: 11px; color: var(--text-sub); font-family: var(--mono); flex: 1; }
.btn-action {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  transition: color .15s, background .15s;
  white-space: nowrap;
}
.btn-action:hover { color: var(--text); }
.btn-action.copied { color: var(--accent-lit); }
.output-code {
  flex: 1;
  min-height: 0;
  background: #0a0a0d;
  border: none;
  border-radius: 0;
  color: #90b890;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  padding: 14px;
  resize: none;
  outline: none;
}

/* ── IMPORT MODAL ── */
.import-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.import-overlay.open { display: flex; }
.import-modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 22px;
  width: 580px;
  max-width: 92vw;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.import-modal-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.import-modal textarea { min-height: 260px; font-family: var(--mono); font-size: 12px; background: var(--bg); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-primary {
  background: var(--accent2);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  color: var(--accent-lit);
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 18px;
  cursor: pointer;
  transition: background .15s;
}
.btn-primary:hover { background: #233228; }
.btn-cancel {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 14px;
  cursor: pointer;
}
.btn-cancel:hover { color: var(--text); }

@media (max-width: 860px) {
  .app-main { flex-direction: column; overflow-y: auto; }
  .tab-panel.active { flex-direction: column; overflow: visible; }
  .form-panel { border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
  .output-panel { width: 100%; height: 360px; }
}
</style>
</head>
<body>

<header class="app-header">
  <span class="app-logo">SA DUELS EDITOR</span>
  <span class="app-desc">데이터 파일 생성 도구 · 독립 실행형</span>
</header>

<div class="app-tabs">
  <button class="tab-btn active" onclick="switchTab('apostle')">◈ 사도 편집 (data.js)</button>
  <button class="tab-btn"        onclick="switchTab('battle')">◈ 배틀 편집 (scenes.js)</button>
</div>

<div class="app-main">

  <!-- ══ 사도 탭 ══ -->
  <div id="tab-apostle" class="tab-panel active">
    <div class="form-panel">

      <div class="section">
        <div class="section-title">파일 관리</div>
        <div class="toolbar">
          <button class="btn-sm accent" onclick="openImport('apostle')">↑ 기존 data.js 불러오기</button>
          <button class="btn-sm" onclick="resetApostleForm()">초기화</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="field-row">
          <div class="field"><label class="field-label">CODE</label>
            <input type="text" id="a-code" placeholder="SA_001" oninput="renderApostle()">
          </div>
          <div class="field"><label class="field-label">이름 (한글)</label>
            <input type="text" id="a-name" placeholder="빅토리아" oninput="renderApostle()">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">이름 (영문)</label>
            <input type="text" id="a-name_en" placeholder="VICTORIA" oninput="renderApostle()">
          </div>
          <div class="field"><label class="field-label">세계</label>
            <input type="text" id="a-world" placeholder="마천루의 세계" oninput="renderApostle()">
          </div>
        </div>
        <div class="field"><label class="field-label">프로필 이미지 경로</label>
          <input type="text" id="a-profile_img" placeholder="src/profile.png" oninput="renderApostle()">
        </div>
      </div>

      <div class="section">
        <div class="section-title">능력 스탯</div>
        <div class="field-row">
          <div class="field"><label class="field-label">무기 (weapon)</label>
            <input type="text" id="a-weapon" placeholder="격투술" oninput="renderApostle()">
          </div>
          <div class="field"><label class="field-label">전략 (strategy)</label>
            <input type="text" id="a-strategy" placeholder="정면 돌파" oninput="renderApostle()">
          </div>
        </div>
        <div class="field"><label class="field-label">능력 (ability)</label>
          <input type="text" id="a-ability" placeholder="초능력 기반 역장 생성 및 신체 강화" oninput="renderApostle()">
        </div>
        <div class="field"><label class="field-label">소속 (affiliation) — 큰따옴표 그대로 입력 가능</label>
          <input type="text" id="a-affiliation" placeholder='메가코프 "스텔라" 보안과 리더' oninput="renderApostle()">
        </div>
      </div>

      <div class="section">
        <div class="section-title">특성 (traits)</div>
        <div class="field-row">
          <div class="field"><label class="field-label">강점 제목</label>
            <input type="text" id="a-str-title" placeholder="⚡ 강점" oninput="renderApostle()">
          </div>
          <div class="field"><label class="field-label">약점 제목</label>
            <input type="text" id="a-wk-title" placeholder="⚠ 약점" oninput="renderApostle()">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">강점 내용</label>
            <textarea id="a-str-body" placeholder="강점 설명…" oninput="renderApostle()"></textarea>
          </div>
          <div class="field"><label class="field-label">약점 내용</label>
            <textarea id="a-wk-body" placeholder="약점 설명…" oninput="renderApostle()"></textarea>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">프로필 설명 (description)</div>
        <div class="field">
          <textarea id="a-description" class="very-tall" placeholder="사도 설명…" oninput="renderApostle()"></textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-title">홈 / 어웨이 설정 (settings)</div>
        <div class="field-row">
          <div class="field"><label class="field-label">홈 태그</label>
            <input type="text" id="a-home-tag" placeholder="🏠 홈 설정" oninput="renderApostle()">
          </div>
          <div class="field"><label class="field-label">어웨이 태그</label>
            <input type="text" id="a-away-tag" placeholder="✈ 어웨이 설정" oninput="renderApostle()">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">홈 설정 내용</label>
            <textarea id="a-home-body" class="tall" oninput="renderApostle()"></textarea>
          </div>
          <div class="field"><label class="field-label">어웨이 설정 내용</label>
            <textarea id="a-away-body" class="tall" oninput="renderApostle()"></textarea>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">전적 목록 (records)</div>
        <div class="item-list" id="records-list"></div>
        <button class="btn-add" onclick="addRecord()">+ 전적 추가</button>
      </div>

    </div>
    <div class="output-panel">
      <div class="output-header">
        <span class="output-filename" id="a-filename">S???/data.js</span>
        <button class="btn-action" id="a-copy-btn" onclick="copyOutput('apostle')">복사</button>
        <button class="btn-action" onclick="downloadOutput('apostle')">↓ 저장</button>
      </div>
      <textarea class="output-code" id="a-output" readonly spellcheck="false"></textarea>
    </div>
  </div><!-- /tab-apostle -->


  <!-- ══ 배틀 탭 ══ -->
  <div id="tab-battle" class="tab-panel">
    <div class="form-panel">

      <div class="section">
        <div class="section-title">파일 관리</div>
        <div class="toolbar">
          <button class="btn-sm accent" onclick="openImport('battle')">↑ 기존 scenes.js 불러오기</button>
          <button class="btn-sm" onclick="resetBattleForm()">초기화</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">배틀 기본 정보</div>
        <div class="field-row">
          <div class="field"><label class="field-label">CODE</label>
            <input type="text" id="b-code" placeholder="B001" oninput="renderBattle()">
          </div>
          <div class="field"><label class="field-label">결과 (home_result)</label>
            <select id="b-home_result" onchange="renderBattle()">
              <option value="lose">lose — 홈 패배</option>
              <option value="win">win — 홈 승리</option>
              <option value="draw">draw — 무승부</option>
            </select>
          </div>
        </div>
        <div class="field"><label class="field-label">매치업 표시 (matchup)</label>
          <input type="text" id="b-matchup" placeholder="빅토리아 vs 릴리스" oninput="renderBattle()">
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">홈 CODE</label>
            <input type="text" id="b-home" placeholder="SA_001" oninput="renderBattle()">
          </div>
          <div class="field"><label class="field-label">홈 이름</label>
            <input type="text" id="b-home_name" placeholder="빅토리아" oninput="renderBattle()">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">홈 세계 (home_world)</label>
            <input type="text" id="b-home_world" placeholder="마천루의 세계" oninput="renderBattle()">
          </div>
          <div class="field"><label class="field-label">어웨이 CODE</label>
            <input type="text" id="b-away" placeholder="SA_004" oninput="renderBattle()">
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label class="field-label">어웨이 이름</label>
            <input type="text" id="b-away_name" placeholder="릴리스" oninput="renderBattle()">
          </div>
          <div class="field"><label class="field-label">어웨이 세계 (away_world)</label>
            <input type="text" id="b-away_world" placeholder="어둠의 세계" oninput="renderBattle()">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">인트로 화면 설정 (setting)</div>
        <div class="field"><label class="field-label">전장 위치 (setting.location)</label>
          <input type="text" id="b-setting-location" placeholder="센트럴 시티 — 교회 폐허" oninput="renderBattle()">
        </div>
        <div class="field"><label class="field-label">배경 스토리 (setting.story) — 큰따옴표 그대로 입력 가능</label>
          <textarea id="b-setting-story" class="very-tall" placeholder="배경 스토리…" oninput="renderBattle()"></textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-title">씬 목록 (scenes) <span id="scene-count" style="color:var(--text-dim);font-size:10px;letter-spacing:0;"></span></div>
        <div class="item-list" id="scenes-list"></div>
        <button class="btn-add" onclick="addScene()">+ 씬 추가</button>
      </div>

    </div>
    <div class="output-panel">
      <div class="output-header">
        <span class="output-filename" id="b-filename">B???/scenes.js</span>
        <button class="btn-action" id="b-copy-btn" onclick="copyOutput('battle')">복사</button>
        <button class="btn-action" onclick="downloadOutput('battle')">↓ 저장</button>
      </div>
      <textarea class="output-code" id="b-output" readonly spellcheck="false"></textarea>
    </div>
  </div><!-- /tab-battle -->

</div><!-- /app-main -->


<!-- ── Import Modal ── -->
<div class="import-overlay" id="import-overlay" onclick="closeImportOnBg(event)">
  <div class="import-modal">
    <div class="import-modal-title" id="import-title">기존 파일 불러오기</div>
    <p style="font-size:12px;color:var(--text-sub);line-height:1.7;">
      data.js 또는 scenes.js의 전체 내용을 아래에 붙여넣으면 폼에 자동으로 채워집니다.
    </p>
    <textarea id="import-textarea" placeholder="const SA_DATA = { … };  또는  const BATTLE = { … };"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeImport()">취소</button>
      <button class="btn-primary" onclick="doImport()">불러오기</button>
    </div>
  </div>
</div>


<script>
'use strict';

/* ═══════════ STATE ═══════════ */
let activeTab    = 'apostle';
let importTarget = 'apostle';
let records = [];
let scenes  = [];

/* ═══════════ TAB ═══════════ */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', i === (tab === 'apostle' ? 0 : 1));
  });
  document.getElementById('tab-apostle').classList.toggle('active', tab === 'apostle');
  document.getElementById('tab-battle').classList.toggle('active',  tab === 'battle');
}

/* ═══════════ UTILS ═══════════ */
const v   = id => document.getElementById(id).value;
const set = (id, val) => { document.getElementById(id).value = val ?? ''; };

/* JS 문자열 이스케이프 — 큰따옴표, 역슬래시, 줄바꿈 모두 처리 */
function escStr(s) {
  return String(s ?? '')
    .replace(/\\/g,   '\\\\')
    .replace(/"/g,    '\\"')
    .replace(/\r\n/g, '\\n')
    .replace(/\n/g,   '\\n');
}

/* ═══════════ RECORDS (apostle) ═══════════ */
function addRecord(data) {
  const idx = records.length;
  records.push(data ?? { code:'', position:'HOME', matchup:'', result:'lose', summary:'', thumb:'', highlight:'' });
  renderRecordsList();
  renderApostle();
  openItem(document.querySelectorAll('#records-list .item-card')[idx]);
}

function removeRecord(idx) {
  records.splice(idx, 1);
  renderRecordsList();
  renderApostle();
}

function moveRecord(idx, dir) {
  const to = idx + dir;
  if (to < 0 || to >= records.length) return;
  [records[idx], records[to]] = [records[to], records[idx]];
  renderRecordsList();
  renderApostle();
}

function collectRecord(idx) {
  const p = 'rec-' + idx + '-';
  return {
    code:      v(p+'code'),
    position:  v(p+'position'),
    matchup:   v(p+'matchup'),
    result:    v(p+'result'),
    summary:   v(p+'summary'),
    thumb:     v(p+'thumb'),
    highlight: v(p+'highlight'),
  };
}

function syncRecord(idx) {
  records[idx] = collectRecord(idx);
  const card = document.querySelectorAll('#records-list .item-card')[idx];
  if (card) {
    card.querySelector('.item-label').textContent =
      (records[idx].code || '(코드)') + ' — ' + (records[idx].matchup || '(매치업)');
    const badge = card.querySelector('.item-badge');
    badge.className = 'item-badge ' + records[idx].result;
    badge.textContent = records[idx].result.toUpperCase();
  }
  renderApostle();
}

function renderRecordsList() {
  const list = document.getElementById('records-list');
  const openStates = [...list.querySelectorAll('.item-card')].map(c => c.classList.contains('open'));
  list.innerHTML = '';
  records.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'item-card' + (openStates[i] ? ' open' : '');
    /* HTML 구조만 — 값은 아래에서 DOM setter로 안전하게 삽입 */
    d.innerHTML =
      '<div class="item-header" onclick="toggleItem(this.parentElement)">' +
        '<span class="item-num">' + String(i+1).padStart(2,'0') + '</span>' +
        '<span class="item-label"></span>' +
        '<span class="item-badge"></span>' +
        '<div class="item-controls" onclick="event.stopPropagation()">' +
          '<button class="item-btn" onclick="moveRecord(' + i + ',-1)">↑</button>' +
          '<button class="item-btn" onclick="moveRecord(' + i + ', 1)">↓</button>' +
          '<button class="item-btn del" onclick="removeRecord(' + i + ')">✕</button>' +
        '</div>' +
        '<span class="item-chevron">›</span>' +
      '</div>' +
      '<div class="item-body">' +
        '<div class="field-row">' +
          '<div class="field"><label class="field-label">배틀 CODE</label>' +
            '<input type="text" id="rec-' + i + '-code" placeholder="B001" oninput="syncRecord(' + i + ')"></div>' +
          '<div class="field"><label class="field-label">포지션</label>' +
            '<select id="rec-' + i + '-position" onchange="syncRecord(' + i + ')">' +
              '<option value="HOME">HOME</option><option value="AWAY">AWAY</option>' +
            '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label class="field-label">매치업</label>' +
            '<input type="text" id="rec-' + i + '-matchup" placeholder="빅토리아 vs 릴리스" oninput="syncRecord(' + i + ')"></div>' +
          '<div class="field"><label class="field-label">결과</label>' +
            '<select id="rec-' + i + '-result" onchange="syncRecord(' + i + ')">' +
              '<option value="lose">lose</option><option value="win">win</option><option value="draw">draw</option>' +
            '</select></div>' +
        '</div>' +
        '<div class="field"><label class="field-label">요약 (summary)</label>' +
          '<textarea id="rec-' + i + '-summary" class="tall" oninput="syncRecord(' + i + ')"></textarea></div>' +
        '<div class="field-row">' +
          '<div class="field"><label class="field-label">썸네일 경로</label>' +
            '<input type="text" id="rec-' + i + '-thumb" placeholder="../../Archives/B001/src/thumb.png" oninput="syncRecord(' + i + ')"></div>' +
          '<div class="field"><label class="field-label">하이라이트 경로</label>' +
            '<input type="text" id="rec-' + i + '-highlight" placeholder="../../Archives/B001/src/highlight.png" oninput="syncRecord(' + i + ')"></div>' +
        '</div>' +
      '</div>';
    /* 값 삽입: DOM setter 사용 → 큰따옴표 등 특수문자 완전 안전 */
    d.querySelector('.item-label').textContent = (r.code||'(코드)') + ' — ' + (r.matchup||'(매치업)');
    const badge = d.querySelector('.item-badge');
    badge.className = 'item-badge ' + r.result;
    badge.textContent = r.result.toUpperCase();
    d.querySelector('#rec-' + i + '-code').value      = r.code      ?? '';
    d.querySelector('#rec-' + i + '-position').value  = r.position  ?? 'HOME';
    d.querySelector('#rec-' + i + '-matchup').value   = r.matchup   ?? '';
    d.querySelector('#rec-' + i + '-result').value    = r.result    ?? 'lose';
    d.querySelector('#rec-' + i + '-summary').value   = r.summary   ?? '';
    d.querySelector('#rec-' + i + '-thumb').value     = r.thumb     ?? '';
    d.querySelector('#rec-' + i + '-highlight').value = r.highlight ?? '';
    list.appendChild(d);
  });
}

/* ═══════════ SCENES (battle) ═══════════ */
function addScene(data) {
  const idx = scenes.length;
  const num = String(idx + 1).padStart(2, '0');
  scenes.push(data ?? { img:'src/s' + num + '.png', title:'', desc:'', note:'' });
  renderScenesList();
  renderBattle();
  openItem(document.querySelectorAll('#scenes-list .item-card')[idx]);
}

function removeScene(idx) {
  scenes.splice(idx, 1);
  renderScenesList();
  renderBattle();
}

function moveScene(idx, dir) {
  const to = idx + dir;
  if (to < 0 || to >= scenes.length) return;
  [scenes[idx], scenes[to]] = [scenes[to], scenes[idx]];
  renderScenesList();
  renderBattle();
}

function collectScene(idx) {
  const p = 'sc-' + idx + '-';
  return { img:v(p+'img'), title:v(p+'title'), desc:v(p+'desc'), note:v(p+'note') };
}

function syncScene(idx) {
  scenes[idx] = collectScene(idx);
  const card = document.querySelectorAll('#scenes-list .item-card')[idx];
  if (card) card.querySelector('.item-label').textContent = scenes[idx].title || '(제목 없음)';
  renderBattle();
}

function renderScenesList() {
  const list = document.getElementById('scenes-list');
  const openStates = [...list.querySelectorAll('.item-card')].map(c => c.classList.contains('open'));
  list.innerHTML = '';
  document.getElementById('scene-count').textContent = '(' + scenes.length + '개)';
  scenes.forEach((sc, i) => {
    const d = document.createElement('div');
    d.className = 'item-card' + (openStates[i] ? ' open' : '');
    d.innerHTML =
      '<div class="item-header" onclick="toggleItem(this.parentElement)">' +
        '<span class="item-num">' + String(i+1).padStart(2,'0') + '</span>' +
        '<span class="item-label"></span>' +
        '<div class="item-controls" onclick="event.stopPropagation()">' +
          '<button class="item-btn" onclick="moveScene(' + i + ',-1)">↑</button>' +
          '<button class="item-btn" onclick="moveScene(' + i + ', 1)">↓</button>' +
          '<button class="item-btn del" onclick="removeScene(' + i + ')">✕</button>' +
        '</div>' +
        '<span class="item-chevron">›</span>' +
      '</div>' +
      '<div class="item-body">' +
        '<div class="field-row">' +
          '<div class="field"><label class="field-label">이미지 경로 (img)</label>' +
            '<input type="text" id="sc-' + i + '-img" placeholder="src/s01.png" oninput="syncScene(' + i + ')"></div>' +
          '<div class="field"><label class="field-label">씬 제목 (title)</label>' +
            '<input type="text" id="sc-' + i + '-title" placeholder="조우" oninput="syncScene(' + i + ')"></div>' +
        '</div>' +
        '<div class="field"><label class="field-label">본문 (desc) — 줄바꿈·큰따옴표 그대로 입력</label>' +
          '<textarea id="sc-' + i + '-desc" class="tall" oninput="syncScene(' + i + ')"></textarea></div>' +
        '<div class="field"><label class="field-label">분석 노트 (note)</label>' +
          '<textarea id="sc-' + i + '-note" class="tall" oninput="syncScene(' + i + ')"></textarea></div>' +
      '</div>';
    /* DOM setter로 값 삽입 */
    d.querySelector('.item-label').textContent = sc.title || '(제목 없음)';
    d.querySelector('#sc-' + i + '-img').value   = sc.img   ?? '';
    d.querySelector('#sc-' + i + '-title').value = sc.title ?? '';
    d.querySelector('#sc-' + i + '-desc').value  = sc.desc  ?? '';
    d.querySelector('#sc-' + i + '-note').value  = sc.note  ?? '';
    list.appendChild(d);
  });
}

/* ═══════════ ACCORDION ═══════════ */
function toggleItem(card) { card.classList.toggle('open'); }
function openItem(card)   { if (card) card.classList.add('open'); }

  L.push('  },');

/* ═══════════ COPY / DOWNLOAD ═══════════ */
function copyOutput(tab) {
  const outId = tab === 'apostle' ? 'a-output' : 'b-output';
  const btnId = tab === 'apostle' ? 'a-copy-btn' : 'b-copy-btn';
  navigator.clipboard.writeText(document.getElementById(outId).value).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function downloadOutput(tab) {
  const isA = tab === 'apostle';
  const text = document.getElementById(isA ? 'a-output' : 'b-output').value;
  const name = document.getElementById(isA ? 'a-filename' : 'b-filename')
                        .textContent.split('/').pop();
  const a = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([text], {type:'text/javascript;charset=utf-8'})),
    download: name
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ═══════════ IMPORT MODAL ═══════════ */
function openImport(target) {
  importTarget = target;
  document.getElementById('import-title').textContent =
    target === 'apostle' ? 'data.js 불러오기' : 'scenes.js 불러오기';
  document.getElementById('import-textarea').value = '';
  document.getElementById('import-overlay').classList.add('open');
  setTimeout(() => document.getElementById('import-textarea').focus(), 50);
}
function closeImport() { document.getElementById('import-overlay').classList.remove('open'); }
function closeImportOnBg(e) { if (e.target.id === 'import-overlay') closeImport(); }

function doImport() {
  const raw = document.getElementById('import-textarea').value.trim();
  if (!raw) return;
  try {
    if (importTarget === 'apostle') {
      populateApostleForm(new Function(raw + '\nreturn SA_DATA;')());
    } else {
      populateBattleForm(new Function(raw + '\nreturn BATTLE;')());
    }
    closeImport();
  } catch(e) {
    alert('파싱 실패: ' + e.message + '\n\nconst SA_DATA = { … }; 또는 const BATTLE = { … }; 형식인지 확인해주세요.');
  }
}

/* ═══════════ POPULATE FORMS ═══════════ */
function populateApostleForm(d) {
  set('a-code',        d.code);
  set('a-name',        d.name);
  set('a-name_en',     d.name_en);
  set('a-world',       d.world);
  set('a-profile_img', d.profile_img);
  if (d.stats) {
    set('a-weapon',      d.stats.weapon);
    set('a-ability',     d.stats.ability);
    set('a-strategy',    d.stats.strategy);
    set('a-affiliation', d.stats.affiliation);
  }
  if (d.traits) {
    set('a-str-title', d.traits.strength?.title);
    set('a-str-body',  d.traits.strength?.body);
    set('a-wk-title',  d.traits.weakness?.title);
    set('a-wk-body',   d.traits.weakness?.body);
  }
  set('a-description', d.description);
  if (d.settings) {
    set('a-home-tag',  d.settings.home?.tag);
    set('a-home-body', d.settings.home?.body);
    set('a-away-tag',  d.settings.away?.tag);
    set('a-away-body', d.settings.away?.body);
  }
  records = (d.records ?? []).map(r => ({
    code:      r.code      ?? '',
    position:  r.position  ?? 'HOME',
    matchup:   r.matchup   ?? '',
    result:    r.result    ?? 'lose',
    summary:   r.summary   ?? '',
    thumb:     r.thumb     ?? '',
    highlight: r.highlight ?? '',
  }));
  renderRecordsList();
  renderApostle();
}

function populateBattleForm(d) {
  set('b-code',             d.code);
  set('b-matchup',          d.matchup);
  set('b-home',             d.home);
  set('b-home_name',        d.home_name);
  set('b-home_world',       d.home_world);
  set('b-away',             d.away);
  set('b-away_name',        d.away_name);
  set('b-away_world',       d.away_world);
  set('b-setting-location', d.setting?.location);
  set('b-setting-story',    d.setting?.story);
  document.getElementById('b-home_result').value = d.home_result ?? 'lose';
  scenes = (d.scenes ?? []).map(sc => ({
    img:   sc.img   ?? '',
    title: sc.title ?? '',
    desc:  sc.desc  ?? '',
    note:  sc.note  ?? '',
  }));
  renderScenesList();
  renderBattle();
}

/* ═══════════ RESET ═══════════ */
function resetApostleForm() {
  if (!confirm('사도 폼을 초기화하시겠습니까?')) return;
  ['a-code','a-name','a-name_en','a-world','a-profile_img',
   'a-weapon','a-ability','a-strategy','a-affiliation',
   'a-str-title','a-str-body','a-wk-title','a-wk-body',
   'a-description','a-home-tag','a-home-body','a-away-tag','a-away-body'
  ].forEach(id => set(id, ''));
  records = [];
  renderRecordsList();
  renderApostle();
}

function resetBattleForm() {
  if (!confirm('배틀 폼을 초기화하시겠습니까?')) return;
  ['b-code','b-matchup','b-home','b-home_name','b-home_world',
   'b-away','b-away_name','b-away_world','b-setting-location','b-setting-story'
  ].forEach(id => set(id,''));
  document.getElementById('b-home_result').value = 'lose';
  scenes = [];
  renderScenesList();
  renderBattle();
}

/* ═══════════ INIT ═══════════ */
renderApostle();
renderBattle();
</script>
