<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA DUELS</title>
<link rel="stylesheet" href="sa.css">
<style>
  body { display: flex; flex-direction: column; }

  .hero {
    padding: 80px 40px 64px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: 'SA DUELS';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(80px, 18vw, 220px);
    font-weight: 900;
    color: rgba(201,168,76,0.04);
    white-space: nowrap; pointer-events: none; user-select: none;
  }
  .hero-eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 20px; }
  .hero-title   { font-size: clamp(28px, 5vw, 52px); font-weight: 900; color: #eeeef2; letter-spacing: 6px; margin-bottom: 20px; }
  .hero-desc    { font-size: 12px; color: var(--text-sub); max-width: 360px; margin: 0 auto; line-height: 2; }

  .apostle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .apostle-card {
    display: block; text-decoration: none; color: inherit;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color 0.2s;
  }
  .apostle-card:hover { border-color: var(--gold); }

  .apostle-thumb-wrap {
    position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--bg3);
  }
  .apostle-thumb {
    width: 100%; height: 100%; object-fit: cover; object-position: top; display: block;
    transition: transform 0.3s ease;
  }
  .apostle-card:hover .apostle-thumb { transform: scale(1.03); }

  .apostle-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 48px 14px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
  }
  .apostle-code { font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 2px; }
  .apostle-name { font-size: 15px; font-weight: 700; color: #eeeef2; }

  .apostle-meta {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }
  .apostle-world { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; }

  .site-footer {
    border-top: 1px solid var(--border); padding: 20px 40px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-sub); letter-spacing: 1px;
  }

  @media (max-width: 640px) {
    .apostle-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .hero { padding: 56px 24px 48px; }
    .page { padding: 32px 20px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo">SA DUELS</a>
</header>

<div class="hero">
  <div class="hero-eyebrow">DEFEAT ARCHIVE</div>
  <h1 class="hero-title">SA DUELS</h1>
  <p class="hero-desc">사도들의 패배 기록을 수집합니다.</p>
</div>

<main class="page">
  <div class="section-header">
    <span class="section-title">SACRED AGENTS</span>
    <div class="section-line"></div>
  </div>
  <div class="apostle-grid" id="grid">
    <div class="status-msg">로딩 중...</div>
  </div>
</main>

<footer class="site-footer">
  <span>SA DUELS — DEFEAT ARCHIVE</span>
  <span>SA 듀얼 협회 아카이브 부서</span>
</footer>

<script src="manifest.js"></script>
<script>
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  SA_MANIFEST.apostles.forEach(a => {
    const card = document.createElement('a');
    card.className = 'apostle-card';
    card.href = `SA/viewer.html?code=${a.code}&folder=${a.folder}`;
    card.innerHTML = `
      <div class="apostle-thumb-wrap">
        <img class="apostle-thumb" src="SA/${a.folder}/${a.thumb}" alt="${a.name}" onerror="this.style.opacity=0">
        <div class="apostle-overlay">
          <div class="apostle-code">${a.code}</div>
          <div class="apostle-name">${a.name}</div>
        </div>
      </div>
      <div class="apostle-meta">
        <span class="apostle-world">${a.world}</span>
      </div>`;
    grid.appendChild(card);
  });
</script>

</body>
</html>
