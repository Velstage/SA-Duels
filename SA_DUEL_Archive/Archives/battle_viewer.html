<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배틀 아카이브 — SA DUELS</title>
<link rel="stylesheet" href="../sa.css">
<style>
  body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ══ 인트로 화면 ══ */
  #prologue {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg);
    overflow-y: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    transition: opacity 0.35s ease;
  }
  #prologue.hiding { opacity: 0; pointer-events: none; }

  .pro-inner {
    max-width: 760px;
    width: 100%;
    padding: 64px 40px 80px;
  }

  .pro-code {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .pro-matchup {
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 900;
    color: #eeeef2;
    letter-spacing: 2px;
    margin-bottom: 48px;
    line-height: 1.1;
  }

  /* 파이터 카드 */
  .fighters-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 20px;
    align-items: center;
    margin-bottom: 40px;
  }
  .fighter-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .fighter-card.home { border-top: 2px solid var(--gold); }
  .fighter-card.away { border-top: 2px solid var(--border); }

  .fighter-badge {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 3px 14px;
    border-radius: 0 0 6px 6px;
  }
  .fighter-badge.home {
    background: var(--gold);
    color: var(--bg);
  }
  .fighter-badge.away {
    background: var(--bg3);
    color: var(--text-sub);
    border: 1px solid var(--border);
    border-top: none;
  }

  .fighter-profile-img {
    width: 110px;
    height: 110px;
    object-fit: cover;
    border-radius: 4px;
    margin-top: 14px;
    filter: grayscale(15%) brightness(0.9);
    border: 1px solid var(--border);
  }
  .fighter-name {
    font-size: 18px;
    font-weight: 700;
    color: #eeeef2;
    letter-spacing: 1px;
    text-align: center;
  }
  .fighter-code {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gold);
  }
  .fighter-world {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }

  .vs-col {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .vs-label {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--text-dim);
  }

  /* 설정 블록 */
  .pro-setting {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 32px;
  }
  .pro-setting-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pro-setting-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pro-location {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .pro-location strong { color: var(--text); font-weight: 600; }
  .pro-story {
    font-size: 13px;
    color: var(--text);
    line-height: 1.85;
    white-space: pre-line;
  }

  /* 배틀 시작 버튼 */
  .pro-start-btn {
    display: block;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--gold-dim);
    border-radius: var(--radius);
    color: var(--gold);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 16px;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .pro-start-btn:hover { background: var(--bg3); border-color: var(--gold); }

  /* ══ 배틀 뷰어 ══ */
  .battle-header {
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  .battle-code-tag { font-size: 10px; color: var(--gold); letter-spacing: 3px; margin-bottom: 4px; }
  .battle-title    { font-size: 22px; font-weight: 700; color: #eeeef2; letter-spacing: 1px; margin-bottom: 8px; }
  .battle-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 11px; padding: 2px 10px;
    border-radius: 2px; border: 1px solid var(--border);
    color: var(--text-sub); letter-spacing: 1px;
  }

  .page {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 32px;
    padding: 20px 40px;
    flex: 1;
    min-height: 0;
    align-items: stretch;
  }

  .viewer-col { display: flex; flex-direction: column; min-height: 0; }
  .viewer-img-wrap {
    position: relative;
    flex: 1;
    min-height: 300px;
    background: var(--bg3);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .viewer-img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .sidebar { display: flex; flex-direction: column; gap: 20px; }
  .scene-nav { display: flex; gap: 8px; justify-content: center; }
  .scene-nav button {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s;
    font-family: var(--font);
  }
  .scene-nav button:hover { border-color: var(--gold); }
  .scene-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

  .scene-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
  }
  .scene-title { font-size: 17px; font-weight: 700; color: #eeeef2; }
  .scene-desc  { font-size: 14px; color: var(--text); line-height: 1.65; }
  .scene-note  { font-size: 12px; color: var(--text-sub); line-height: 1.5; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  /* 인트로 돌아가기 버튼 (배틀 뷰어 안) */
  .btn-back-intro {
    background: none;
    border: none;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0;
    text-align: left;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .btn-back-intro:hover { color: var(--gold); }

  @media (max-width: 1000px) {
    .page { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .fighters-row { grid-template-columns: 1fr 1fr; }
    .vs-col { display: none; }
  }
  @media (max-width: 600px) {
    .pro-inner { padding: 40px 20px 60px; }
    .fighters-row { grid-template-columns: 1fr; gap: 12px; }
    .vs-col { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="site-logo">SA DUELS</a>
  <span class="site-divider">/</span>
  <a href="index.html" class="site-breadcrumb">배틀 아카이브</a>
  <span class="site-divider">/</span>
  <span class="site-breadcrumb" id="breadcrumb-name">로딩 중…</span>
</header>

<!-- 인트로 화면 -->
<div id="prologue">
  <div class="pro-inner">
    <div class="pro-code" id="pro-code"></div>
    <div class="pro-matchup" id="pro-matchup">로딩 중…</div>

    <div class="fighters-row">
      <div class="fighter-card home">
        <span class="fighter-badge home">HOME</span>
        <img class="fighter-profile-img" id="pro-home-img" src="" alt="">
        <div class="fighter-name"  id="pro-home-name"></div>
        <div class="fighter-code"  id="pro-home-code"></div>
        <div class="fighter-world" id="pro-home-world"></div>
      </div>
      <div class="vs-col"><span class="vs-label">VS</span></div>
      <div class="fighter-card away">
        <span class="fighter-badge away">AWAY</span>
        <img class="fighter-profile-img" id="pro-away-img" src="" alt="">
        <div class="fighter-name"  id="pro-away-name"></div>
        <div class="fighter-code"  id="pro-away-code"></div>
        <div class="fighter-world" id="pro-away-world"></div>
      </div>
    </div>

    <div class="pro-setting" id="pro-setting" style="display:none">
      <div class="pro-setting-label">전장 배경</div>
      <div class="pro-location" id="pro-location"></div>
      <div class="pro-story" id="pro-story"></div>
    </div>

    <button class="pro-start-btn" onclick="startBattle()">배틀 시작 →</button>
  </div>
</div>

<!-- 배틀 뷰어 (인트로 아래에 숨겨진 상태로 미리 렌더) -->
<main class="page">
  <div class="viewer-col">
    <div class="viewer-img-wrap">
      <img class="viewer-img" id="viewer-img" src="" alt="배틀 씬">
    </div>
  </div>
  <div class="sidebar">
    <div class="scene-nav">
      <button id="prev-btn" onclick="changeScene(-1)">이전</button>
      <button id="next-btn" onclick="changeScene(1)">다음</button>
    </div>
    <button class="btn-back-intro" onclick="showPrologue()">← 인트로로 돌아가기</button>
    <div class="scene-info" id="scene-info"></div>
  </div>
</main>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const code   = urlParams.get('code');
  const folder = code || null;

  if (!code) {
    document.getElementById('pro-matchup').textContent = '배틀 코드를 지정해주세요.';
  } else {
    const script = document.createElement('script');
    script.src = folder + '/scenes.js';
    script.onload  = () => initBattle(BATTLE);
    script.onerror = () => {
      document.getElementById('pro-matchup').textContent = '데이터를 불러올 수 없습니다.';
    };
    document.head.appendChild(script);
  }

  let currentSceneIndex = 0;

  /* SA 코드 → 프로필 이미지 경로 (SA_001 → ../SA/S001/src/profile.png) */
  function profileSrc(saCode) {
    return '../SA/' + saCode.replace('SA_', 'S') + '/src/facial.png';
  }

  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text || '';
  }

  function initBattle(data) {
    document.title = data.code + ' — ' + data.matchup + ' — SA DUELS';
    setText('breadcrumb-name', data.code + ' ' + data.matchup);

    /* ── 인트로 채우기 ── */
    setText('pro-code',       data.code);
    setText('pro-matchup',    data.matchup);

    setText('pro-home-name',  data.home_name  || data.home);
    setText('pro-home-code',  data.home);
    setText('pro-home-world', data.home_world || '');
    document.getElementById('pro-home-img').src = profileSrc(data.home);

    setText('pro-away-name',  data.away_name  || data.away);
    setText('pro-away-code',  data.away);
    setText('pro-away-world', data.away_world || '');
    document.getElementById('pro-away-img').src = profileSrc(data.away);

    if (data.setting) {
      const box = document.getElementById('pro-setting');
      box.style.display = '';
      const locEl = document.getElementById('pro-location');
      if (data.setting.location) {
        locEl.innerHTML = '📍 <strong>' + data.setting.location + '</strong>';
      } else {
        locEl.style.display = 'none';
      }
      setText('pro-story', data.setting.story || '');
    }

    /* ── 배틀 뷰어 채우기 (숨긴 채로 미리) ── */
    const resultText = data.home_result === 'win' ? '홈 승리' :
                       data.home_result === 'lose' ? '홈 패배' : '무승부';
    const header = document.createElement('div');
    header.className = 'battle-header';
    header.innerHTML =
      '<div class="battle-code-tag">' + data.code + '</div>' +
      '<h1 class="battle-title">' + data.matchup + '</h1>' +
      '<div class="battle-meta-row">' +
        '<span class="meta-chip">HOME: ' + (data.home_name || data.home) + '</span>' +
        '<span class="meta-chip">AWAY: ' + (data.away_name || data.away) + '</span>' +
        '<span class="meta-chip result-' + data.home_result + '">' + resultText + '</span>' +
      '</div>';
    document.querySelector('header').insertAdjacentElement('afterend', header);
    header.style.display = 'none'; /* 인트로 동안 숨김 */

    if (data.scenes.length > 0) selectScene(0, data.scenes[0]);
    updateNavButtons(data.scenes.length);
  }

  function startBattle() {
    const pro = document.getElementById('prologue');
    pro.classList.add('hiding');
    pro.addEventListener('transitionend', () => { pro.style.display = 'none'; }, { once: true });
    /* 배틀 헤더 표시 */
    const header = document.querySelector('.battle-header');
    if (header) header.style.display = '';
  }

  function showPrologue() {
    const pro = document.getElementById('prologue');
    const header = document.querySelector('.battle-header');
    if (header) header.style.display = 'none';
    pro.style.display = '';
    pro.classList.remove('hiding');
  }

  function selectScene(index, scene) {
    currentSceneIndex = index;
    document.getElementById('viewer-img').src = './' + folder + '/' + scene.img;
    const info = document.getElementById('scene-info');
    info.innerHTML =
      '<div class="scene-title">' + scene.title + '</div>' +
      '<div class="scene-desc">'  + scene.desc.replace(/\n/g,'<br>') + '</div>' +
      '<div class="scene-note">'  + scene.note.replace(/\n/g,'<br>') + '</div>';
    updateNavButtons(BATTLE.scenes.length);
  }

  function changeScene(direction) {
    const newIndex = currentSceneIndex + direction;
    if (newIndex >= 0 && newIndex < BATTLE.scenes.length) {
      selectScene(newIndex, BATTLE.scenes[newIndex]);
    }
  }

  function updateNavButtons(total) {
    document.getElementById('prev-btn').disabled = currentSceneIndex <= 0;
    document.getElementById('next-btn').disabled = currentSceneIndex >= total - 1;
  }
</script>
</body>
</html>
